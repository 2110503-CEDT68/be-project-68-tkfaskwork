<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Suggest – CoWork</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .recommend-layout { max-width: 660px; margin: 0 auto; padding: 40px 24px; display: flex; flex-direction: column; gap: 20px; }
    .prompt-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow);
      padding: 36px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 14px;
    }
    .prompt-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      background: var(--primary-light);
      padding: 4px 12px;
      border-radius: 20px;
    }
    .prompt-title { font-size: 1.3rem; font-weight: 800; color: var(--text-dark); letter-spacing: -0.3px; }
    .prompt-description { font-size: 0.875rem; color: var(--text-muted); max-width: 360px; line-height: 1.65; }
    .result-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-card); box-shadow: var(--shadow); overflow: hidden; }
    .result-header {
      background: var(--primary);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .result-header-title { font-size: 0.78rem; font-weight: 700; color: rgba(255,255,255,0.85); text-transform: uppercase; letter-spacing: 0.08em; }
    .result-body { padding: 22px; display: flex; flex-direction: column; gap: 16px; }
    .result-space-name { font-size: 1.25rem; font-weight: 800; color: var(--text-dark); }
    .result-reason {
      font-size: 0.875rem;
      color: var(--text-muted);
      line-height: 1.65;
      background: var(--bg);
      border-radius: 8px;
      padding: 14px 16px;
      border-left: 3px solid var(--primary);
    }
    .result-section { display: flex; flex-direction: column; gap: 8px; }
    .result-section-title {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }
    .history-list { display: flex; flex-direction: column; gap: 6px; }
    .history-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 9px 14px;
      font-size: 0.84rem;
    }
    .history-space { font-weight: 600; color: var(--text-dark); }
    .history-date { color: var(--text-muted); font-size: 0.8rem; }
    .alternatives-list { display: flex; flex-direction: column; gap: 6px; }
    .alternative-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 9px 14px;
      font-size: 0.84rem;
      color: var(--text-dark);
    }
    .thinking-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow);
      padding: 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      text-align: center;
    }
    .thinking-dots { display: flex; gap: 6px; }
    .thinking-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--primary);
      animation: bounce 1.2s infinite ease-in-out;
    }
    .thinking-dot:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="navbar-logo">CoWork</a>
    <div class="navbar-links">
      <a href="index.html">Browse</a>
      <a href="bookings.html">My Bookings</a>
      <a href="recommend.html" class="active">AI Suggest</a>
    </div>
    <div class="navbar-auth" id="navAuth"></div>
  </div>
</nav>

<div class="recommend-layout">
  <div class="prompt-card" id="promptCard">
    <span class="prompt-label">Powered by AI</span>
    <div class="prompt-title">Space Recommender</div>
    <p class="prompt-description">
      Get a personalized co-working space recommendation based on your booking history.
    </p>
    <button class="btn btn-primary btn-lg" id="recommendBtn" onclick="getRecommendation()">
      Get My Recommendation
    </button>
  </div>
  <div id="resultArea"></div>
</div>

<script>
  const API = '/api/v1';
  const BANGKOK_TIMEZONE = 'Asia/Bangkok';

  const api = (path, opts = {}) => fetch(API + path, {
    headers: {
      'Content-Type': 'application/json',
      ...(localStorage.getItem('token') ? { Authorization: 'Bearer ' + localStorage.getItem('token') } : {})
    },
    ...opts
  });

  function isLoggedIn() { return !!localStorage.getItem('token'); }

  function getUserName() {
    try {
      const token = localStorage.getItem('token');
      if (!token) return null;
      const payload = JSON.parse(atob(token.split('.')[1]));
      return payload.name || payload.email || 'User';
    } catch { return 'User'; }
  }

  function escHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  if (!isLoggedIn()) window.location.href = 'index.html';

  function renderNav() {
    const navAuth = document.getElementById('navAuth');
    navAuth.innerHTML = `
      <span class="user-greeting">Hi, ${getUserName()}</span>
      <button class="btn btn-ghost btn-sm" id="logoutBtn">Sign Out</button>
    `;
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('token');
      window.location.href = 'index.html';
    });
  }
  renderNav();

  async function getRecommendation() {
    const btn = document.getElementById('recommendBtn');
    const resultArea = document.getElementById('resultArea');

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Analyzing...';

    resultArea.innerHTML = `
      <div class="thinking-card">
        <div class="thinking-dots">
          <div class="thinking-dot"></div>
          <div class="thinking-dot"></div>
          <div class="thinking-dot"></div>
        </div>
        <div style="font-size:0.875rem;color:var(--text-muted);font-weight:500;">Analyzing your booking history...</div>
      </div>
    `;

    try {
      const [recRes, histRes] = await Promise.all([
        api('/recommend', { method: 'POST' }),
        api('/reservations')
      ]);

      const recData = await recRes.json();
      if (!recRes.ok) throw new Error(recData.message || 'Recommendation failed');

      let history = [];
      if (histRes.ok) {
        const histData = await histRes.json();
        history = Array.isArray(histData.data) ? histData.data : (Array.isArray(histData) ? histData : []);
      }

      renderResult(recData.data || recData, history);
    } catch (err) {
      resultArea.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Get Another Recommendation';
    }
  }

  function renderResult(rec, history) {
    const resultArea = document.getElementById('resultArea');
    const spaceName = rec.recommended || rec.recommendedSpace || rec.space || rec.name || '—';
    const reason = rec.reason || rec.description || rec.explanation || '';
    const alternatives = rec.alternatives || rec.alternativeSpaces || [];

    let historyHtml = '';
    if (history && history.length > 0) {
      const recent = history.slice(0, 5);
      historyHtml = `
        <div class="result-section">
          <div class="result-section-title">Based on your recent bookings</div>
          <div class="history-list">
            ${recent.map(r => {
              const name = r.coworkingSpace?.name || 'Unknown Space';
              const date = new Date(r.apptDate).toLocaleDateString('en-GB', {
                timeZone: BANGKOK_TIMEZONE, weekday: 'short', month: 'short', day: 'numeric'
              });
              return `
                <div class="history-item">
                  <span class="history-space">${escHtml(name)}</span>
                  <span class="history-date">${escHtml(date)}</span>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `;
    }

    let altHtml = '';
    if (alternatives.length > 0) {
      altHtml = `
        <div class="result-section">
          <div class="result-section-title">Alternative Spaces</div>
          <div class="alternatives-list">
            ${alternatives.map(alt => {
              const altName = typeof alt === 'string' ? alt : (alt.name || alt.space || JSON.stringify(alt));
              return `<div class="alternative-item">${escHtml(altName)}</div>`;
            }).join('')}
          </div>
        </div>
      `;
    }

    resultArea.innerHTML = `
      <div class="result-card">
        <div class="result-header">
          <span class="result-header-title">Recommended for You</span>
        </div>
        <div class="result-body">
          <div class="result-space-name">${escHtml(spaceName)}</div>
          ${reason ? `<div class="result-reason">${escHtml(reason)}</div>` : ''}
          ${historyHtml}
          ${altHtml}
          <div style="margin-top:4px;">
            <a href="index.html" class="btn btn-outline btn-sm">Browse All Spaces</a>
          </div>
        </div>
      </div>
    `;
  }
</script>
</body>
</html>
