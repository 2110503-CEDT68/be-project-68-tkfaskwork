<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Details – CoWork</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: #f4f6fb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07), 0 6px 24px rgba(56,71,149,0.10);
      max-width: 420px;
      width: 100%;
      overflow: hidden;
    }
    .card-header {
      background: #384795;
      color: #fff;
      padding: 28px 24px 24px;
      text-align: center;
    }
    .card-header-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.65);
      margin-bottom: 8px;
    }
    .card-header h1 { font-size: 1.2rem; font-weight: 700; }
    .card-header p { font-size: 0.84rem; color: rgba(255,255,255,0.72); margin-top: 4px; }
    .badge {
      display: inline-block;
      background: rgba(255,255,255,0.18);
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 99px;
      margin-top: 12px;
      letter-spacing: 0.05em;
      border: 1px solid rgba(255,255,255,0.25);
    }
    .card-body { padding: 24px; }
    .section-title {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9ca3af;
      margin-bottom: 14px;
    }
    .row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }
    .row-label { font-size: 0.75rem; color: #9ca3af; margin-bottom: 2px; }
    .row-value { font-size: 0.9rem; font-weight: 600; color: #111827; }
    .divider { border: none; border-top: 1px solid #e5e7eb; margin: 20px 0; }
    .id-box {
      background: #f4f6fb;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 10px 14px;
      font-family: monospace;
      font-size: 0.75rem;
      color: #6b7280;
      word-break: break-all;
    }
    .state-box {
      text-align: center;
      padding: 40px 24px;
    }
    .state-box .state-title { font-size: 1rem; font-weight: 700; color: #111827; margin-bottom: 8px; }
    .state-box .state-msg { font-size: 0.875rem; color: #6b7280; }
    .error-header { background: #dc2626; }
    .back-link {
      display: inline-block;
      margin-top: 10px;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.8);
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="state-box"><div class="state-msg">Loading booking details...</div></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    async function load() {
      const card = document.getElementById('card');
      if (!id) {
        card.innerHTML = `
          <div class="card-header error-header">
            <div class="card-header-label">CoWork</div>
            <h1>Invalid QR Code</h1>
            <p>No booking ID was provided.</p>
          </div>
          <div class="state-box"><div class="state-msg">Please scan a valid booking QR code.</div></div>
        `;
        return;
      }

      try {
        const res = await fetch(`/api/v1/reservations/public/${id}`);
        const json = await res.json();

        if (!res.ok || !json.success) {
          card.innerHTML = `
            <div class="card-header error-header">
              <div class="card-header-label">CoWork</div>
              <h1>Booking Not Found</h1>
              <p>This QR code may be invalid or the booking was cancelled.</p>
            </div>
            <div class="state-box"><div class="state-msg">Please contact the front desk for assistance.</div></div>
          `;
          return;
        }

        const d = json.data;
        const space = d.coworkingSpace;
        const user = d.user;

        const dateStr = new Date(d.apptDate).toLocaleDateString('en-GB', {
          weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', timeZone: 'Asia/Bangkok'
        });
        const startTime = new Date(d.apptDate).toLocaleTimeString('en-GB', {
          hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Bangkok'
        });
        const endTime = d.apptEnd ? new Date(d.apptEnd).toLocaleTimeString('en-GB', {
          hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Bangkok'
        }) : null;

        card.innerHTML = `
          <div class="card-header">
            <div class="card-header-label">CoWork</div>
            <h1>${space.name}</h1>
            <p>${space.address}</p>
            <span class="badge">Confirmed</span>
          </div>
          <div class="card-body">
            <div class="section-title">Appointment</div>
            <div class="row">
              <div>
                <div class="row-label">Date</div>
                <div class="row-value">${dateStr}</div>
              </div>
            </div>
            <div class="row">
              <div>
                <div class="row-label">Time</div>
                <div class="row-value">${startTime}${endTime ? ' – ' + endTime : ''}</div>
              </div>
            </div>
            <div class="row">
              <div>
                <div class="row-label">Space Hours</div>
                <div class="row-value">${space.opentime} – ${space.closetime}</div>
              </div>
            </div>
            <hr class="divider">
            <div class="section-title">Guest</div>
            <div class="row">
              <div>
                <div class="row-label">Name</div>
                <div class="row-value">${user.name}</div>
              </div>
            </div>
            <div class="row">
              <div>
                <div class="row-label">Tel</div>
                <div class="row-value">${user.tel}</div>
              </div>
            </div>
            <hr class="divider">
            <div class="section-title">Booking ID</div>
            <div class="id-box">${d._id}</div>
          </div>
        `;
      } catch (e) {
        document.getElementById('card').innerHTML = `
          <div class="card-header error-header">
            <div class="card-header-label">CoWork</div>
            <h1>Connection Error</h1>
            <p>Could not reach the server.</p>
          </div>
          <div class="state-box"><div class="state-msg">Please check your connection and try again.</div></div>
        `;
      }
    }

    load();
  </script>
</body>
</html>
