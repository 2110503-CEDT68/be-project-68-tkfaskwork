<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Details</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.10);
            max-width: 420px;
            width: 100%;
            overflow: hidden;
        }
        .card-header {
            background: #2563EB;
            color: white;
            padding: 24px;
            text-align: center;
        }
        .card-header .icon { font-size: 40px; margin-bottom: 8px; }
        .card-header h1 { font-size: 20px; font-weight: 700; }
        .card-header p { font-size: 13px; opacity: 0.85; margin-top: 4px; }
        .badge {
            display: inline-block;
            background: #22c55e;
            color: white;
            font-size: 12px;
            font-weight: 600;
            padding: 3px 12px;
            border-radius: 99px;
            margin-top: 10px;
            letter-spacing: 0.5px;
        }
        .card-body { padding: 24px; }
        .section-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
            margin-bottom: 12px;
        }
        .row {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 14px;
        }
        .row-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
        .row-label { font-size: 12px; color: #94a3b8; }
        .row-value { font-size: 15px; font-weight: 600; color: #1e293b; }
        .divider { border: none; border-top: 1px solid #e2e8f0; margin: 20px 0; }
        .id-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 10px 14px;
            font-family: monospace;
            font-size: 12px;
            color: #64748b;
            word-break: break-all;
        }
        .error {
            text-align: center;
            padding: 40px 24px;
            color: #ef4444;
        }
        .error .icon { font-size: 40px; margin-bottom: 12px; }
        .error p { color: #64748b; margin-top: 8px; font-size: 14px; }
        .loading {
            text-align: center;
            padding: 48px 24px;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="card" id="card">
        <div class="loading">Loading booking details...</div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        async function load() {
            const card = document.getElementById('card');
            if (!id) {
                card.innerHTML = `<div class="error"><div class="icon">⚠️</div><strong>No booking ID provided.</strong><p>Scan a valid QR code.</p></div>`;
                return;
            }

            try {
                const res = await fetch(`/api/v1/reservations/public/${id}`);
                const json = await res.json();

                if (!res.ok || !json.success) {
                    card.innerHTML = `<div class="error"><div class="icon">❌</div><strong>Booking not found.</strong><p>This QR code may be invalid or the booking was cancelled.</p></div>`;
                    return;
                }

                const d = json.data;
                const space = d.coworkingSpace;
                const user = d.user;
                const appt = new Date(d.apptDate);

                const dateStr = appt.toLocaleDateString('en-GB', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', timeZone: 'Asia/Bangkok' });
                const timeStr = appt.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Bangkok' });

                card.innerHTML = `
                    <div class="card-header">
                        <div class="icon">🏢</div>
                        <h1>${space.name}</h1>
                        <p>${space.address}</p>
                        <span class="badge">✓ Confirmed</span>
                    </div>
                    <div class="card-body">
                        <p class="section-title">Appointment</p>
                        <div class="row">
                            <span class="row-icon">📅</span>
                            <div>
                                <div class="row-label">Date</div>
                                <div class="row-value">${dateStr}</div>
                            </div>
                        </div>
                        <div class="row">
                            <span class="row-icon">🕐</span>
                            <div>
                                <div class="row-label">Time</div>
                                <div class="row-value">${timeStr}</div>
                            </div>
                        </div>
                        <div class="row">
                            <span class="row-icon">🕗</span>
                            <div>
                                <div class="row-label">Space Hours</div>
                                <div class="row-value">${space.opentime} – ${space.closetime}</div>
                            </div>
                        </div>
                        <hr class="divider">
                        <p class="section-title">Guest</p>
                        <div class="row">
                            <span class="row-icon">👤</span>
                            <div>
                                <div class="row-label">Name</div>
                                <div class="row-value">${user.name}</div>
                            </div>
                        </div>
                        <div class="row">
                            <span class="row-icon">📞</span>
                            <div>
                                <div class="row-label">Tel</div>
                                <div class="row-value">${user.tel}</div>
                            </div>
                        </div>
                        <hr class="divider">
                        <p class="section-title">Booking ID</p>
                        <div class="id-box">${d._id}</div>
                    </div>
                `;
            } catch (e) {
                document.getElementById('card').innerHTML = `<div class="error"><div class="icon">⚠️</div><strong>Connection error.</strong><p>Could not reach the server.</p></div>`;
            }
        }

        load();
    </script>
</body>
</html>
