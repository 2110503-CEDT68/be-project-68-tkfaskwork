<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Bookings – CoWork</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .booking-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .booking-item {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow);
      padding: 20px;
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .booking-item-body {
      flex: 1;
      min-width: 0;
    }
    .booking-item-name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 4px;
    }
    .booking-item-address {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .booking-item-date {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--primary-light);
      color: var(--primary);
      font-size: 0.8rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
    }
    .booking-item-actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    .booking-item-qr {
      flex-shrink: 0;
    }
    @media (max-width: 520px) {
      .booking-item { flex-direction: column; }
      .booking-item-qr { align-self: center; }
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="navbar-logo">CoWork</a>
    <div class="navbar-links">
      <a href="index.html">Browse</a>
      <a href="bookings.html" class="active">My Bookings</a>
      <a href="recommend.html">&#10024; AI Suggest</a>
    </div>
    <div class="navbar-auth" id="navAuth"></div>
  </div>
</nav>

<!-- MAIN -->
<main class="page-container">
  <div style="margin-bottom:24px;">
    <h1 class="page-title">My Bookings</h1>
    <p class="page-subtitle">Manage your upcoming reservations</p>
  </div>

  <div id="bookingsList">
    <!-- skeletons -->
    <div class="booking-list">
      <div class="booking-item">
        <div class="booking-item-body" style="width:100%;">
          <div class="skeleton" style="height:18px;width:45%;margin-bottom:8px;"></div>
          <div class="skeleton" style="height:13px;width:70%;margin-bottom:10px;"></div>
          <div class="skeleton" style="height:26px;width:35%;border-radius:20px;"></div>
        </div>
      </div>
      <div class="booking-item">
        <div class="booking-item-body" style="width:100%;">
          <div class="skeleton" style="height:18px;width:50%;margin-bottom:8px;"></div>
          <div class="skeleton" style="height:13px;width:65%;margin-bottom:10px;"></div>
          <div class="skeleton" style="height:26px;width:40%;border-radius:20px;"></div>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="editModalTitle">
    <div class="modal-header">
      <h2 class="modal-title" id="editModalTitle">Edit Booking</h2>
      <button class="modal-close" id="editModalClose" aria-label="Close">&times;</button>
    </div>
    <div id="editAlert"></div>
    <div class="form-group">
      <label class="form-label" for="editApptDate">New Date</label>
      <input type="date" id="editApptDate" class="input" required />
    </div>
    <div class="form-group">
      <label class="form-label" for="editApptStartSlot">New Start Time (Hourly)</label>
      <select id="editApptStartSlot" class="input" required>
        <option value="">Select start time</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label" for="editApptEndSlot">New End Time (Hourly)</label>
      <select id="editApptEndSlot" class="input" required>
        <option value="">Select end time</option>
      </select>
    </div>
    <button class="btn btn-primary btn-block" id="editSaveBtn">Save Changes</button>
  </div>
</div>

<script>
  const API = 'http://localhost:5000/api/v1';
  const BANGKOK_TIMEZONE = 'Asia/Bangkok';

  const api = (path, opts = {}) => fetch(API + path, {
    headers: {
      'Content-Type': 'application/json',
      ...(localStorage.getItem('token') ? { Authorization: 'Bearer ' + localStorage.getItem('token') } : {})
    },
    ...opts
  });

  function isLoggedIn() { return !!localStorage.getItem('token'); }

  function getUserName() {
    try {
      const token = localStorage.getItem('token');
      if (!token) return null;
      const payload = JSON.parse(atob(token.split('.')[1]));
      return payload.name || payload.email || 'User';
    } catch { return 'User'; }
  }

  function escHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function parseTimeToMinutes(timeStr) {
    const [hourStr, minuteStr] = String(timeStr || '').split(':');
    const hour = Number(hourStr);
    const minute = Number(minuteStr);
    if (!Number.isInteger(hour) || !Number.isInteger(minute)) return null;
    if (hour < 0 || hour > 23 || minute < 0 || minute > 59) return null;
    return (hour * 60) + minute;
  }

  function toHHMM(totalMinutes) {
    const hour = String(Math.floor(totalMinutes / 60)).padStart(2, '0');
    const minute = String(totalMinutes % 60).padStart(2, '0');
    return `${hour}:${minute}`;
  }

  function buildHourlySlots(openTime, closeTime) {
    const openMinutes = parseTimeToMinutes(openTime);
    const closeMinutes = parseTimeToMinutes(closeTime);
    if (openMinutes === null || closeMinutes === null || openMinutes > closeMinutes) return [];

    const firstHour = Math.ceil(openMinutes / 60) * 60;
    const lastHour = Math.floor(closeMinutes / 60) * 60;
    const slots = [];
    for (let m = firstHour; m <= lastHour; m += 60) {
      slots.push(toHHMM(m));
    }
    return slots;
  }

  function getBangkokDateParts(date) {
    const parts = new Intl.DateTimeFormat('en-GB', {
      timeZone: BANGKOK_TIMEZONE,
      year: 'numeric',
      month: '2-digit',
      day: '2-digit'
    }).formatToParts(date);
    return {
      year: Number(parts.find((p) => p.type === 'year')?.value),
      month: Number(parts.find((p) => p.type === 'month')?.value),
      day: Number(parts.find((p) => p.type === 'day')?.value)
    };
  }

  function getBangkokTimeParts(date) {
    const parts = new Intl.DateTimeFormat('en-GB', {
      timeZone: BANGKOK_TIMEZONE,
      hour: '2-digit',
      minute: '2-digit',
      hour12: false
    }).formatToParts(date);
    return {
      hour: Number(parts.find((p) => p.type === 'hour')?.value),
      minute: Number(parts.find((p) => p.type === 'minute')?.value)
    };
  }

  function getBangkokTodayDateValue() {
    const { year, month, day } = getBangkokDateParts(new Date());
    return `${String(year).padStart(4, '0')}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
  }

  function toBangkokDateValue(date) {
    const { year, month, day } = getBangkokDateParts(date);
    return `${String(year).padStart(4, '0')}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
  }

  function toBangkokTimeValue(date) {
    const { hour, minute } = getBangkokTimeParts(date);
    return `${String(hour).padStart(2, '0')}:${String(minute).padStart(2, '0')}`;
  }

  function bangkokDateTimeToISO(dateStr, timeStr) {
    const dateMatch = /^(\d{4})-(\d{2})-(\d{2})$/.exec(String(dateStr || ''));
    const timeMatch = /^(\d{2}):(\d{2})$/.exec(String(timeStr || ''));
    if (!dateMatch || !timeMatch) return null;

    const year = Number(dateMatch[1]);
    const month = Number(dateMatch[2]);
    const day = Number(dateMatch[3]);
    const hour = Number(timeMatch[1]);
    const minute = Number(timeMatch[2]);
    if (
      !Number.isInteger(year) || !Number.isInteger(month) || !Number.isInteger(day) ||
      !Number.isInteger(hour) || !Number.isInteger(minute) ||
      month < 1 || month > 12 || day < 1 || day > 31 || hour < 0 || hour > 23 || minute < 0 || minute > 59
    ) {
      return null;
    }

    const utcMillis = Date.UTC(year, month - 1, day, hour - 7, minute, 0, 0);
    const iso = new Date(utcMillis).toISOString();
    return Number.isNaN(new Date(iso).getTime()) ? null : iso;
  }

  function setMinDateInput(inputEl) {
    inputEl.min = getBangkokTodayDateValue();
  }

  function populateEndSlots(endSelectId, allSlots, selectedStart) {
    const endSelect = document.getElementById(endSelectId);
    const startMinutes = parseTimeToMinutes(selectedStart);
    const endSlots = allSlots.filter((slot) => parseTimeToMinutes(slot) > startMinutes);
    endSelect.innerHTML = [
      '<option value="">Select end time</option>',
      ...endSlots.map((slot) => `<option value="${slot}">${slot}</option>`)
    ].join('');
    endSelect.disabled = endSlots.length === 0;
    return endSlots;
  }

  function formatDate(dateStr) {
    if (!dateStr) return '—';
    return new Date(dateStr).toLocaleString('en-GB', {
      timeZone: BANGKOK_TIMEZONE,
      weekday: 'short', year: 'numeric', month: 'short',
      day: 'numeric', hour: '2-digit', minute: '2-digit'
    });
  }

  function formatRange(startDateStr, endDateStr) {
    const startText = formatDate(startDateStr);
    if (!endDateStr) return startText;
    const endText = new Date(endDateStr).toLocaleTimeString('en-GB', {
      timeZone: BANGKOK_TIMEZONE,
      hour: '2-digit',
      minute: '2-digit'
    });
    return `${startText} - ${endText}`;
  }

  if (!isLoggedIn()) {
    window.location.href = 'index.html';
  }

  function renderNav() {
    const navAuth = document.getElementById('navAuth');
    navAuth.innerHTML = `
      <span class="user-greeting">Hi, ${getUserName()}</span>
      <button class="btn btn-ghost btn-sm" id="logoutBtn">Logout</button>
    `;
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('token');
      window.location.href = 'index.html';
    });
  }
  renderNav();

  let editingId = null;
  const editModal = document.getElementById('editModal');
  document.getElementById('editModalClose').addEventListener('click', closeEditModal);
  editModal.addEventListener('click', (e) => { if (e.target === editModal) closeEditModal(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeEditModal(); });

  function openEditModal(id, startDate, endDate, openTime, closeTime) {
    editingId = id;
    document.getElementById('editAlert').innerHTML = '';

    const dateInput = document.getElementById('editApptDate');
    const startSelect = document.getElementById('editApptStartSlot');
    const endSelect = document.getElementById('editApptEndSlot');

    const allSlots = buildHourlySlots(openTime, closeTime);
    const startSlots = allSlots.slice(0, Math.max(0, allSlots.length - 1));
    startSelect.innerHTML = [
      '<option value="">Select start time</option>',
      ...startSlots.map((slot) => `<option value="${slot}">${slot}</option>`)
    ].join('');
    startSelect.disabled = startSlots.length === 0;
    endSelect.innerHTML = '<option value="">Select end time</option>';
    endSelect.disabled = true;

    if (startDate) {
      const start = new Date(startDate);
      const end = endDate ? new Date(endDate) : null;
      dateInput.value = toBangkokDateValue(start);
      const currentStartSlot = toBangkokTimeValue(start);
      startSelect.value = startSlots.includes(currentStartSlot) ? currentStartSlot : '';
      if (startSelect.value) {
        const endSlots = populateEndSlots('editApptEndSlot', allSlots, startSelect.value);
        const currentEndSlot = end ? toBangkokTimeValue(end) : '';
        endSelect.value = endSlots.includes(currentEndSlot) ? currentEndSlot : '';
      }
    } else {
      dateInput.value = '';
      startSelect.value = '';
      endSelect.value = '';
    }

    setMinDateInput(dateInput);
    startSelect.onchange = () => populateEndSlots('editApptEndSlot', allSlots, startSelect.value);
    editModal.classList.add('open');
    dateInput.focus();
  }

  function closeEditModal() {
    editModal.classList.remove('open');
    editingId = null;
  }

  document.getElementById('editSaveBtn').addEventListener('click', async () => {
    const alertEl = document.getElementById('editAlert');
    const btn = document.getElementById('editSaveBtn');
    const apptDate = document.getElementById('editApptDate').value;
    const apptStartSlot = document.getElementById('editApptStartSlot').value;
    const apptEndSlot = document.getElementById('editApptEndSlot').value;
    alertEl.innerHTML = '';

    if (!apptDate || !apptStartSlot || !apptEndSlot) {
      alertEl.innerHTML = '<div class="alert alert-error" style="margin-bottom:8px;">Please select date, start time, and end time.</div>';
      return;
    }

    const apptStartISO = bangkokDateTimeToISO(apptDate, apptStartSlot);
    const apptEndISO = bangkokDateTimeToISO(apptDate, apptEndSlot);
    if (!apptStartISO || !apptEndISO) {
      alertEl.innerHTML = '<div class="alert alert-error" style="margin-bottom:8px;">Invalid date/time selection.</div>';
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Saving...';
    try {
      const res = await api(`/reservations/${editingId}`, {
        method: 'PUT',
        body: JSON.stringify({ apptDate: apptStartISO, apptEnd: apptEndISO })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Update failed');
      closeEditModal();
      await loadBookings();
    } catch (err) {
      alertEl.innerHTML = `<div class="alert alert-error" style="margin-bottom:8px;">${err.message}</div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save Changes';
    }
  });

  async function deleteBooking(id) {
    if (!confirm('Are you sure you want to cancel this booking?')) return;
    try {
      const res = await api(`/reservations/${id}`, { method: 'DELETE' });
      if (!res.ok) {
        const data = await res.json();
        throw new Error(data.message || 'Delete failed');
      }
      await loadBookings();
    } catch (err) {
      alert('Error: ' + err.message);
    }
  }

  function renderBookings(bookings) {
    const container = document.getElementById('bookingsList');
    if (bookings.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">&#x1F4C5;</div>
          <div class="empty-state-text">No bookings yet</div>
          <a href="index.html" class="btn btn-primary" style="margin-top:16px;">Browse Spaces</a>
        </div>
      `;
      return;
    }

    container.innerHTML = `<div class="booking-list">${
      bookings.map((b) => {
        const space = b.coworkingSpace || {};
        const spaceName = space.name || b.spaceName || 'Unknown Space';
        const address = space.address || '';
        const qrCode = b.qrCode || '';
        return `
          <div class="booking-item" id="booking-${escHtml(b._id)}">
            <div class="booking-item-body">
              <div class="booking-item-name">${escHtml(spaceName)}</div>
              ${address ? `<div class="booking-item-address"><span>&#x1F4CD;</span>${escHtml(address)}</div>` : ''}
              <div class="booking-item-date">
                <span>&#x1F4C5;</span>
                ${escHtml(formatRange(b.apptDate, b.apptEnd))}
              </div>
              <div class="booking-item-actions">
                <button class="btn btn-outline btn-sm" onclick="openEditModal('${escHtml(b._id)}', '${escHtml(b.apptDate)}', '${escHtml(b.apptEnd || '')}', '${escHtml(space.opentime || '')}', '${escHtml(space.closetime || '')}')">
                  &#9998; Edit
                </button>
                <button class="btn btn-danger btn-sm" onclick="deleteBooking('${escHtml(b._id)}')">
                  &#x1F5D1; Cancel
                </button>
              </div>
            </div>
            ${qrCode ? `
              <div class="booking-item-qr">
                <div class="qr-container">
                  <img src="${escHtml(qrCode)}" alt="QR Code" />
                  <span class="qr-label">QR Code</span>
                </div>
              </div>
            ` : ''}
          </div>
        `;
      }).join('')
    }</div>`;
  }

  async function loadBookings() {
    try {
      const res = await api('/reservations');
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Failed to load bookings');
      const bookings = Array.isArray(data) ? data : (data.data || []);
      renderBookings(bookings);
    } catch (err) {
      document.getElementById('bookingsList').innerHTML = `
        <div class="alert alert-error">${err.message}</div>
      `;
    }
  }

  loadBookings();
</script>
</body>
</html>
